name: Bug report
description: Report a defect in the softwareFactoryVscode package
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python, Docker, VS Code, package version, host layout.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Validation evidence
      description: Include failing commands, logs, or screenshots as needed.
    validations:
      required: false
  - type: textarea
    id: compact_packet
    attributes:
      label: Compact execution packet
      description: Target files, conceptual domain, read-first context, authority anchors, narrow validation, diff size, and downstream status.
    validations:
      required: true
