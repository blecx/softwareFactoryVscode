name: Software Factory CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration-test:
    name: "Architectural Boundary & Regression Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Make regression test executable
        run: chmod +x ./tests/run-integration-test.sh

      - name: Run isolated integration test
        run: ./tests/run-integration-test.sh

  template-validation:
    name: "PR Template Conformance Validation"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      
      - name: Validate PR Template Formatting
        # Only runs if the script exists, acting as a guardrail. Make sure execution flag is set.
        run: |
          chmod +x ./scripts/validate-pr-template.sh
          ./scripts/validate-pr-template.sh "${{ github.workspace }}/.github/pull_request_template.md"
