name: Software Factory CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-quality:
    name: "Python Code Quality (Lint & Format)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r factory_runtime/agents/requirements.txt
          pip install -r requirements.dev.txt

      - name: Check code formatting (Black)
        run: black --check factory_runtime/ scripts/ tests/

      - name: Check imports strictly (isort)
        run: isort --check-only factory_runtime/ scripts/ tests/

      - name: Lint codebase (Flake8)
        run: flake8 factory_runtime/ scripts/ tests/ --max-line-length=120 --ignore=E203,W503,E402,E731,F401,F841

      - name: Run unit tests
        run: pytest tests/ || true

  integration-test:
    name: "Architectural Boundary Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run isolated integration test
        run: chmod +x ./tests/run-integration-test.sh && ./tests/run-integration-test.sh

  template-validation:
    name: "PR Template Conformance"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR Template Formatting
        run: chmod +x ./scripts/validate-pr-template.sh && ./scripts/validate-pr-template.sh "${{ github.workspace }}/.github/pull_request_template.md"
