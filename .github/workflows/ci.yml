name: Software Factory CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  classifier:
    name: "Resolve Validation Plan"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      level: ${{ steps.set-level.outputs.level }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Restore/cache .venv local virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('setup.sh', 'requirements.dev.txt', 'factory_runtime/agents/requirements.txt') }}

      - name: Install dependencies
        run: |
          bash ./setup.sh

      - name: Resolve CI Level
        id: set-level
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "level=merge" >> "$GITHUB_OUTPUT"
          else
            echo "level=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Export Matrix
        id: set-matrix
        run: |
          # Use PR base ref if available, else HEAD^ as standard comparison point
          if [[ -n "${{ github.base_ref }}" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            export BASE_REV="origin/${{ github.base_ref }}"
          else
            export BASE_REV="HEAD^"
          fi
          
          MATRIX=$(./.venv/bin/python ./scripts/local_ci_parity.py --level ${{ steps.set-level.outputs.level }} --base-rev "$BASE_REV" --export-ci-matrix)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  run_bundle:
    name: "${{ matrix.name }}"
    needs: classifier
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.classifier.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Restore/cache .venv local virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('setup.sh', 'requirements.dev.txt', 'factory_runtime/agents/requirements.txt') }}

      - name: Install dependencies
        run: |
          bash ./setup.sh

      - name: Run Bundle
        run: |
          if [[ -n "${{ github.base_ref }}" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            export BASE_REV="origin/${{ github.base_ref }}"
          else
            export BASE_REV="HEAD^"
          fi
          
          ./.venv/bin/python ./scripts/local_ci_parity.py \
            --level ${{ needs.classifier.outputs.level }} \
            --base-rev "$BASE_REV" \
            --ci-run-bundle ${{ matrix.bundle }} \
            --fresh-checkout

      - name: Upload production-readiness evidence bundle
        if: always() && matrix.bundle == 'runtime-proofs'
        uses: actions/upload-artifact@v7
        with:
          name: production-readiness-bundle
          path: .tmp/run-artifacts/
          retention-days: 5
          if-no-files-found: ignore
# Verify Git author identity
      - name: Verify Git author identity
        run: ./scripts/verify_git_identity.py --repo-root . --head-rev HEAD
