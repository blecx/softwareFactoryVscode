services:
  bash-gateway-mcp:
    build:
      context: .
      dockerfile: docker/mcp-bash-gateway/Dockerfile
    restart: unless-stopped
    environment:
      - BASH_GATEWAY_MCP_PORT=3011
      - BASH_GATEWAY_MCP_HOST=0.0.0.0
      - BASH_GATEWAY_REPO_ROOT=/target
      - BASH_GATEWAY_POLICY_PATH=${BASH_GATEWAY_POLICY_PATH:-/factory-data/configs/bash_gateway_policy.default.yml}
      - BASH_GATEWAY_AUDIT_DIR=/factory-data/.tmp/agent-script-runs
    ports:
      - "127.0.0.1:${PORT_BASH:-3011}:3011"
    volumes:
      - ${TARGET_WORKSPACE_PATH:-.}:/target
      - ${FACTORY_DIR:-.}:/factory-data
