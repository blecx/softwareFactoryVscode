services:
  offline-docs-mcp:
    build:
      context: .
      dockerfile: docker/mcp-offline-docs/Dockerfile
    restart: unless-stopped
    environment:
      - OFFLINE_DOCS_MCP_PORT=3017
      - OFFLINE_DOCS_MCP_HOST=0.0.0.0
      - OFFLINE_DOCS_MCP_REPO_ROOT=/target
      - OFFLINE_DOCS_INDEX_DB=/factory-data/.tmp/mcp-offline-docs/docs_index.db
      - OFFLINE_DOCS_INDEX_SOURCES=docs,README.md,QUICKSTART.md,templates
    ports:
      - "127.0.0.1:${PORT_DOCS:-3017}:3017"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('127.0.0.1', 3017), timeout=2).close()",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ${TARGET_WORKSPACE_PATH:-.}:/target
      - ${FACTORY_DIR:-.}:/factory-data
