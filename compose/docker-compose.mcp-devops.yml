services:
  docker-compose-mcp:
    build:
      context: .
      dockerfile: docker/mcp-devops-docker-compose/Dockerfile
    restart: unless-stopped
    environment:
      - DOCKER_COMPOSE_MCP_PORT=3015
      - DOCKER_COMPOSE_MCP_HOST=0.0.0.0
      - DOCKER_COMPOSE_MCP_REPO_ROOT=/target
      - DOCKER_COMPOSE_MCP_AUDIT_DIR=/factory-data/.tmp/mcp-docker-compose
    ports:
      - "127.0.0.1:${PORT_TEST:-3015}:3015"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('127.0.0.1', 3015), timeout=2).close()",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ${TARGET_WORKSPACE_PATH:-.}:/target
      - ${FACTORY_DIR:-.}:/factory-data
      - /var/run/docker.sock:/var/run/docker.sock

  test-runner-mcp:
    build:
      context: .
      dockerfile: docker/mcp-devops-test-runner/Dockerfile
    restart: unless-stopped
    environment:
      - TEST_RUNNER_MCP_PORT=3016
      - TEST_RUNNER_MCP_HOST=0.0.0.0
      - TEST_RUNNER_MCP_REPO_ROOT=/target
      - TEST_RUNNER_MCP_AUDIT_DIR=/factory-data/.tmp/mcp-test-runner
      - TEST_RUNNER_PYTHON=python3
    ports:
      - "127.0.0.1:${PORT_COMPOSE:-3016}:3016"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('127.0.0.1', 3016), timeout=2).close()",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ${TARGET_WORKSPACE_PATH:-.}:/target
      - ${FACTORY_DIR:-.}:/factory-data
