
services:
  context7:
    build:
      context: .
      dockerfile: docker/context7/Dockerfile
    restart: unless-stopped
    environment:
      - CONTEXT7_PORT=3010
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY:-}
    ports:
      - "127.0.0.1:${PORT_CONTEXT7:-3010}:3010"
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "nc -z 127.0.0.1 3010 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3